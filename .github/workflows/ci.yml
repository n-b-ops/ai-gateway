# CI workflow — runs on every push and pull request.
# Covers: build, test (with race detector), lint.

name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25.x"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Test (race + short)
        run: go test -v -short -race -timeout 60s ./...

      - name: Test coverage
        if: matrix.go == '1.25.x'
        id: coverage
        run: |
          go test -short -race -coverprofile=coverage.out -covermode=atomic ./...
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
          echo "total=$total" >> "$GITHUB_OUTPUT"
          echo "Total coverage: $total"
          {
            echo "## Go Coverage"
            echo ""
            echo "Go version: \`${{ matrix.go }}\`"
            echo "Total coverage: \`$total\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        if: matrix.go == '1.25.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go-${{ matrix.go }}
          path: coverage.out
          if-no-files-found: error

      - name: Upload coverage to Codecov
        if: matrix.go == '1.25.x'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          flags: unittests
          name: ai-gateway-go-${{ matrix.go }}
          fail_ci_if_error: true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run integration tests
        run: make test-integration

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.x'

    - name: Run golangci-lint (v2)
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.4.0
        args: --verbose
