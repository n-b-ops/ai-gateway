# Release workflow — triggers when a version tag is pushed (e.g. v0.1.0).
# Builds cross-platform binaries, creates GitHub Release, pushes Docker images
# to ghcr.io using GoReleaser.
#
# To trigger a release:
#   git tag v0.1.0
#   git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write        # create GitHub releases + upload assets
  packages: write        # push to ghcr.io
  id-token: write        # needed for keyless signing (future)

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # GoReleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true

      - name: Set up QEMU (for cross-platform Docker builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        run: bash scripts/generate_release_notes.sh "${GITHUB_REF_NAME}" "${RUNNER_TEMP}/release-notes.md"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --release-notes="${{ runner.temp }}/release-notes.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-discord:
    name: Discord Release Notification
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate release notes
        run: bash scripts/generate_release_notes.sh "${GITHUB_REF_NAME}" "${RUNNER_TEMP}/release-notes.md"

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          NOTES=$(head -c 1800 "${RUNNER_TEMP}/release-notes.md")
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"

          PAYLOAD=$(jq -n \
            --arg title "Ferro Labs AI Gateway ${TAG}" \
            --arg url "$RELEASE_URL" \
            --arg desc "$NOTES" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: 16744448
              }]
            }')

          curl -sf -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK"
