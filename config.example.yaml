# Ferro Labs AI Gateway Configuration Example
# Copy to config.yaml and customize.

strategy:
  mode: fallback  # single | fallback | loadbalance | conditional | content-based | ab-test | least-latency | cost-optimized

# --- conditional routing example ---
# strategy:
#   mode: conditional
#   conditions:
#     - key: model
#       value: gpt-4o
#       target_key: openai
#     - key: model
#       value: claude-3-5-sonnet-20241022
#       target_key: anthropic
# Routes based on the value of a request field (e.g. "model").

# --- content-based routing example ---
# strategy:
#   mode: content-based
#   content_conditions:
#     - type: prompt_regex
#       value: "(?i)\\b(code|function|class|implement)\\b"
#       target_key: deepseek
#     - type: prompt_contains
#       value: "translate"
#       target_key: gemini
#     - type: prompt_not_contains
#       value: "confidential"
#       target_key: openai
# First matching rule wins; falls back to the first target when no rule matches.

# --- A/B testing example ---
# strategy:
#   mode: ab-test
#   ab_variants:
#     - target_key: openai
#       weight: 70
#       label: control
#     - target_key: anthropic
#       weight: 30
#       label: challenger
# Weights are relative; use 0 for equal distribution across all variants.

targets:
  - virtual_key: openai
    retry:
      attempts: 3
      # Only retry on these HTTP status codes (omit to retry on any error).
      on_status_codes: [429, 502, 503]
      # Base backoff in ms for exponential back-off: delay = initial_backoff_ms * 2^(attempt-1).
      initial_backoff_ms: 100
  - virtual_key: anthropic
    # Optional per-target circuit breaker.
    circuit_breaker:
      failure_threshold: 5   # consecutive failures before opening
      success_threshold: 1   # successes in half-open state to close
      timeout: 30s           # duration the circuit stays open
  - virtual_key: xai
  - virtual_key: gemini
  - virtual_key: mistral
  - virtual_key: groq
  - virtual_key: together
  - virtual_key: cohere
  - virtual_key: deepseek
  - virtual_key: perplexity
  - virtual_key: fireworks
  - virtual_key: ai21
  - virtual_key: replicate
  - virtual_key: bedrock
  - virtual_key: azure-openai
  - virtual_key: azure-foundry
  - virtual_key: vertex-ai
  - virtual_key: hugging-face
  - virtual_key: ollama
  - virtual_key: ollama-cloud
  - virtual_key: cerebras
  - virtual_key: cloudflare
  - virtual_key: databricks
  - virtual_key: deepinfra
  - virtual_key: moonshot
  - virtual_key: novita
  - virtual_key: nvidia-nim
  - virtual_key: openrouter
  - virtual_key: qwen
  - virtual_key: sambanova

# Model aliases: map friendly names to actual model IDs.
# Aliases are resolved before routing and plugin execution.
aliases:
  fast: gpt-4o-mini
  smart: claude-3-5-sonnet-20241022
  cheap: gemini-1.5-flash
  code: deepseek-coder

# Optional plugins
plugins:
  - name: word-filter
    type: guardrail
    stage: before_request
    enabled: true
    config:
      blocked_words: ["password", "secret"]
      case_sensitive: false

  - name: max-token
    type: guardrail
    stage: before_request
    enabled: true
    config:
      max_tokens: 4096
      max_messages: 50
      # Optional: reject if total character length of all messages exceeds this. 0 = no limit.
      max_input_length: 0

  - name: response-cache
    type: transform
    stage: before_request
    enabled: false
    config:
      max_age: 300
      max_entries: 1000

  - name: request-logger
    type: logging
    stage: before_request
    enabled: true
    config:
      level: info
      # Optional persistent request log storage.
      # When disabled, logs are emitted only to stdout.
      persist: false
      # backend: sqlite | postgres
      backend: sqlite
      # SQLite file path or Postgres DSN (required for postgres backend).
      dsn: ferrogw-requests.db

  # Advanced guardrails (pii-redact, secret-scan, prompt-shield, schema-guard,
  # regex-guard) are available in FerroCloud. See https://docs.ferrolabs.ai/guardrails

  - name: rate-limit
    type: guardrail
    stage: before_request
    enabled: false
    config:
      # Global request-per-second limit applied to all traffic.
      requests_per_second: 100
      # Global burst capacity (defaults to requests_per_second when unset).
      burst: 100
      # Optional per-API-key limit (requests per minute).
      key_rpm: 60
      # Optional per-user limit (requests per minute, keyed on Request.User).
      user_rpm: 30

  - name: budget
    type: guardrail
    stage: before_request
    enabled: false
    config:
      # Shared store identifier — all plugin instances with the same store_id
      # share the same spend counters. Defaults to "default".
      store_id: default
      # Maximum cumulative USD spend allowed per API key. 0 = unlimited.
      spend_limit_usd: 10.0
      # Pricing used to calculate cost from token counts in the response.
      input_per_m_tokens: 3.0    # USD per 1 million prompt tokens
      output_per_m_tokens: 15.0  # USD per 1 million completion tokens
      # Maximum number of API keys tracked in memory. Evicts lowest-spend key at cap.
      max_keys: 10000

# MCP (Model Context Protocol) agentic tool servers.
# When configured, the gateway injects these tools into every chat completion
# request and runs an agentic loop when the LLM returns tool_calls.
# Requires MCP 2025-11-25 Streamable HTTP servers.
mcp_servers:
  # Local filesystem tool server (no auth required).
  - name: filesystem
    url: "http://localhost:3001/mcp"
    timeout_seconds: 10
    max_call_depth: 3

  # Database tool server restricted to read-only tools.
  - name: database
    url: "https://mcp-db.internal/mcp"
    headers:
      Authorization: "Bearer ${MCP_DB_TOKEN}"
    allowed_tools:
      - query_readonly
      - list_tables
    timeout_seconds: 15
    max_call_depth: 5

  # Web-search tool server.
  - name: web-search
    url: "https://mcp-search.example.com/mcp"
    allowed_tools:
      - web_search
      - web_read
    timeout_seconds: 20

# OpenTelemetry tracing (v1.1.0+).
# When unset (or endpoint empty) the gateway runs with a zero-alloc
# NoOp provider — there is no cost to leaving this section out.
# Standard OTEL_* env vars (notably OTEL_EXPORTER_OTLP_ENDPOINT) take
# precedence over any value here.
observability:
  tracing:
    enabled: true
    endpoint: ""            # host:port; leave blank to fall back to OTEL_EXPORTER_OTLP_ENDPOINT
    protocol: grpc           # grpc | http/protobuf
    service_name: ferrogw
    sample_ratio: 1.0
    privacy_level: metadata  # none | metadata | full
    shutdown_grace: 10s      # max time to drain in-flight OTel exports on shutdown
    # headers:                       # OTLP export headers (e.g. vendor API keys)
    #   dd-api-key: "${DATADOG_API_KEY}"   # values support ${ENV} interpolation

  # exporters lists plugin observability exporters that receive
  # gateway.request.completed / gateway.request.failed events.
  # Each entry names a factory registered via observability.RegisterExporter
  # in a plugin's init().  Unrecognised names emit a warning and are skipped
  # (non-fatal).  No built-in exporters ship with this repo — they are
  # provided by the ai-gateway-plugins repo.
  #
  # exporters:
  #   - name: langsmith
  #     enabled: true
  #     config:
  #       api_key: "${LANGSMITH_API_KEY}"
  #   - name: langfuse
  #     enabled: true
  #     config:
  #       public_key: "${LANGFUSE_PUBLIC_KEY}"
  #       secret_key: "${LANGFUSE_SECRET_KEY}"
